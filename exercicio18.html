<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horário</title>

<style>
body{
    background-color: rgb(220, 229, 89);
    color: aliceblue;
    font: normal 20pt Arial;
}
</style>
</head>

<body>

<h1>Verificando hora</h1>

<div id="hora"></div>

<script>
var agora = new Date()
var horario = agora.getHours()
var hora = document.getElementById('hora')

if (horario < 12) {
    hora.innerHTML = '<h2>Bom dia!</h2>'
} else if (horario <= 18) {
    hora.innerHTML = '<h2>Boa tarde!</h2>'
} else {
    hora.innerHTML = '<h2>Boa noite!</h2>'
}
</script>

</body>
</html>
