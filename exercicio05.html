<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passos com DOM</title>
    <style>
        body {
            background-color: rgb(145, 235, 235);
            color:rgb(33, 70, 103);
            font: normal 18pt Arial,;
        }
    </style>
</head>
<body>
    <h1>Iniciando Estudos com DOM</h1>
    <p>Aqui vai o resultado...</p>
    <p>Aprendendo a usar <Strong>DOM</Strong> em Javascript!</p>
    <div>Clique em mim</div>
    <script>
        window.document.write('Olá, Mundo! <br/>')
        var p1 = window.document.getElementsByTagName('p')[0]
        var p2 = window.document.getElementsByTagName('p')[1]
        window.document.write('Está escrito assim: ' + p1.innerText + '<br/>')
        window.document.write('Está escrito assim: ' + p2.innerText + '<br/>')
        window.document.write('URL: ' + window.document.URL)
    </script>
</body>
</html>
